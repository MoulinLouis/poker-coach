repos:
  - repo: local
    hooks:
      - id: ruff-format
        name: ruff format
        entry: bash -c 'cd backend && uv run ruff format --check .'
        language: system
        pass_filenames: false
        types_or: [python]

      - id: ruff-check
        name: ruff check
        entry: bash -c 'cd backend && uv run ruff check .'
        language: system
        pass_filenames: false
        types_or: [python]

      - id: mypy
        name: mypy
        entry: bash -c 'cd backend && uv run mypy src'
        language: system
        pass_filenames: false
        types_or: [python]

      - id: eslint
        name: eslint
        entry: bash -c 'cd frontend && npm run lint'
        language: system
        pass_filenames: false
        files: ^frontend/.*\.(ts|tsx|js|jsx)$

      - id: tsc
        name: tsc
        entry: bash -c 'cd frontend && npm run typecheck'
        language: system
        pass_filenames: false
        files: ^frontend/.*\.(ts|tsx)$
